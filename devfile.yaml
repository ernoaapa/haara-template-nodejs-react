schemaVersion: 2.2.0
metadata:
  name: react-app
  language: javascript
  projectType: nodejs
components:
  - name: runtime
    container:
      image: node:20-alpine
      mountSources: true
      endpoints:
        - name: http
          targetPort: 80
  - name: production
    image:
      imageName: placeholder
      dockerfile:
        uri: ./Dockerfile
        buildContext: .
commands:
  - id: dev
    exec:
      component: runtime
      commandLine: npm install && npm run dev -- --host 0.0.0.0 --port 80
      group:
        kind: run
        isDefault: true
